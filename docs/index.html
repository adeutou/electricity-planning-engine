<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Electricity Planning Engine — API Reference</title>
  <meta name="description" content="OpenAPI reference for the Electricity Planning Engine, an hourly electricity arbitrage API built with Laravel." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ctext y='20' font-size='20'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
  <style>
    body { margin: 0; background: #fafafa; }
    .topbar { display: none; }
    .banner {
      background: #0f172a;
      color: #e2e8f0;
      padding: 0.75rem 1.5rem;
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .banner a { color: #7dd3fc; text-decoration: none; }
    .banner a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="banner">
    <span>⚡ Electricity Planning Engine — API Reference</span>
    <span>
      <a href="https://github.com/adeutou/electricity-planning-engine">Source on GitHub</a>
      · <a href="https://github.com/adeutou/electricity-planning-engine#readme">README</a>
      · <a href="https://github.com/adeutou/electricity-planning-engine/blob/main/docs/home-assistant-integration.md">Home Assistant integration</a>
    </span>
  </div>
  <div id="swagger-ui"></div>

  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js" crossorigin></script>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js" crossorigin></script>
  <script>
    window.onload = () => {
      window.ui = SwaggerUIBundle({
        url: "openapi.yaml",
        dom_id: "#swagger-ui",
        deepLinking: true,
        presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
        layout: "StandaloneLayout",
        docExpansion: "list",
        defaultModelsExpandDepth: 1,
      });
    };
  </script>
</body>
</html>
