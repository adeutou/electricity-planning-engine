name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tests:
    name: Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # ^8.2 est la contrainte déclarée dans composer.json (voir
        # config.platform.php, qui verrouille composer.lock sur cette même
        # base) : on teste réellement les deux versions les plus basses
        # supportées, pas seulement celle de la machine de développement,
        # pour éviter de reproduire silencieusement le bug de lock file
        # trouvé pendant la mise en place de Docker (voir README).
        php: ['8.2', '8.3']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, pdo_sqlite, pdo_pgsql, bcmath, zip
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-php${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-php${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare application environment
        run: |
          cp .env.example .env
          php artisan key:generate

      # phpunit.xml force DB_CONNECTION=sqlite / DB_DATABASE=:memory: pour
      # les tests : aucun service de base de données à démarrer dans ce job,
      # les Feature tests tournent contre une base SQLite en mémoire recréée
      # à chaque test (RefreshDatabase).
      - name: Run test suite
        run: php artisan test

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Valide que l'image se construit encore (Dockerfile, composer.lock
      # verrouillé PHP 8.2+, etc.) à chaque changement, sans la publier nulle
      # part : il n'y a pas encore de registre/cible de déploiement configuré
      # pour ce projet de démonstration. C'est la partie "CD" honnête tant
      # qu'aucun environnement cible n'existe réellement.
      - name: Build application image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: electricity-planning-engine:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
