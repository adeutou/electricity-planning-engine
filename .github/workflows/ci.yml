name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tests:
    uses: ./.github/workflows/tests.yml

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Valide que l'image se construit encore (Dockerfile, composer.lock
      # verrouillé PHP 8.2+, etc.) à chaque changement, sans la publier nulle
      # part : la publication réelle (GHCR) n'a lieu que sur un tag de
      # version, voir release.yml.
      - name: Build application image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: electricity-planning-engine:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
