name: Release

# Ne se déclenche que sur un tag de version explicite (ex. v1.2.0), jamais
# sur un simple push sur main : une Release GitHub + une image Docker
# publiée sont des artefacts publics et versionnés, pas quelque chose qu'on
# veut voir apparaître à chaque commit.
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # créer la Release GitHub
  packages: write   # publier sur ghcr.io

jobs:
  tests:
    uses: ./.github/workflows/tests.yml

  publish-image:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    needs: tests
    outputs:
      image: ${{ steps.image.outputs.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ghcr.io exige un nom d'image en minuscules ; github.repository
      # conserve la casse réelle du owner/repo, d'où la normalisation.
      - name: Resolve image name
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Resolve version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.version.outputs.value }}
            ${{ steps.image.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish-image
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Docker image: `${{ needs.publish-image.outputs.image }}:${{ github.ref_name }}`

            ```bash
            docker pull ${{ needs.publish-image.outputs.image }}:${{ github.ref_name }}
            docker run --rm -p 8000:8000 --env-file .env ${{ needs.publish-image.outputs.image }}:${{ github.ref_name }}
            ```
